name: turing-agentmemory-mcp

services:
  turingdb-volume-init:
    build:
      context: .
      dockerfile: docker/turingdb.Dockerfile
    image: turing-agentmemory-turingdb:local
    entrypoint: ["/bin/sh", "-c", "chown -R 10001:10001 /turing"]
    volumes:
      - turing-data:/turing
    user: "0:0"
    restart: "no"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

  turingdb:
    build:
      context: .
      dockerfile: docker/turingdb.Dockerfile
    image: turing-agentmemory-turingdb:local
    depends_on:
      turingdb-volume-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -e
        rm -f /turing/turingdb.sock
        trap 'turingdb stop -turing-dir /turing || true; exit 0' TERM INT
        turingdb start -turing-dir /turing -i 0.0.0.0 -p 6666 -demon &
        turingdb_pid=$$!
        wait "$$turingdb_pid"
    environment:
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
    ports:
      - "127.0.0.1:6666:6666"
    volumes:
      - turing-data:/turing
    user: "10001:10001"
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nfrom turingdb import TuringDB\nTuringDB(type='json', host='http://127.0.0.1:6666').try_reach(timeout=2)\nPY"]
      interval: 5s
      timeout: 3s
      retries: 80
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
        reservations:
          cpus: "0.25"
          memory: 256m

  turing-agentmemory-mcp:
    build:
      context: .
      args:
        PYPROJECT_EXTRAS: ${PYPROJECT_EXTRAS:-dev}
    image: turing-agentmemory-mcp:local
    depends_on:
      turingdb:
        condition: service_healthy
      agentmemory-embed:
        condition: service_healthy
      agentmemory-rerank:
        condition: service_healthy
    environment:
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - TURINGDB_URL=http://turingdb:6666
      - TURINGDB_HOME=/turing
      - TURINGDB_GRAPH=agent_memory
      - EMBED_BASE_URL=http://agentmemory-embed:8080
      - EMBED_DIMENSIONS=768
      - EMBED_MODEL=mykor/granite-embedding-311m-multilingual-r2-GGUF:Q4_K_M
      - EMBED_API_KEY
      - EMBED_API_KEY_HEADER
      - EMBED_API_KEY_SCHEME
      - RERANK_BASE_URL=http://agentmemory-rerank:8080
      - RERANK_MODEL=Qwen3-Reranker-0.6B-q8_0.gguf
      - RERANK_PROVIDER_MIN_SCORE=${RERANK_PROVIDER_MIN_SCORE:-0.00001}
      - RERANK_DIMENSIONS
      - RERANK_TIMEOUT_SECONDS
      - RERANK_THRESHOLD
      - RERANK_BLEND
      - RERANK_PRESERVE_SEED_MARGIN
      - RERANK_API_KEY
      - RERANK_API_KEY_HEADER
      - RERANK_API_KEY_SCHEME
      - PROVIDER_API_KEY
      - PROVIDER_API_KEY_HEADER
      - PROVIDER_API_KEY_SCHEME
      - GLINER_ENABLED
      - GLINER_BACKEND
      - GLINER_MODEL
      - GLINER_LABELS
      - GLINER_THRESHOLD
      - GLINER_REDACT
      - GLINER_PRECISION
      - GLINER_PROVIDERS
      - AGENTMEMORY_REDACTION_ENABLED
      - AGENTMEMORY_AUDIT_JSONL
      - AGENTMEMORY_OBSERVABILITY_JSONL
      - AGENTMEMORY_OBSERVABILITY_STDERR
      - AGENTMEMORY_AUTH_TOKEN
      - AGENTMEMORY_AUTH_TOKENS
      - AGENTMEMORY_AUTH_CLIENT_ID
      - AGENTMEMORY_AUTH_SCOPES
      - AGENTMEMORY_AUTH_REQUIRED_SCOPES
      - AGENTMEMORY_UTCP_SERVER_NAME
      - AGENTMEMORY_UTCP_MCP_COMMAND
      - AGENTMEMORY_UTCP_AUTH_ENV
    ports:
      - "127.0.0.1:8095:8080"
    volumes:
      - turing-data:/turing
    user: "10001:10001"
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport socket\nsock = socket.create_connection(('127.0.0.1', 8080), timeout=2)\nsock.close()\nPY"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m

  agentmemory-embed:
    build:
      context: .
      dockerfile: docker/llama-provider.Dockerfile
    image: turing-agentmemory-llama-provider:local
    gpus: all
    command:
      - --hf-repo
      - mykor/granite-embedding-311m-multilingual-r2-GGUF:Q4_K_M
      - --embedding
      - --pooling
      - mean
      - --embd-normalize
      - "2"
      - --batch-size
      - "4096"
      - --ubatch-size
      - "4096"
      - --device
      - CUDA0
      - --gpu-layers
      - all
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    environment:
      - HOME=/models
      - LLAMA_CACHE=/models/llama.cpp
      - HF_HOME=/models/huggingface
      - XDG_CACHE_HOME=/models/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    expose:
      - "8080"
    volumes:
      - agentmemory-llama-cache:/models
    user: "10001:10001"
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "nvidia-smi >/dev/null && curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 80
      start_period: 60s
    shm_size: "1g"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8g
        reservations:
          cpus: "1.0"
          memory: 2g
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  agentmemory-rerank:
    build:
      context: .
      dockerfile: docker/llama-provider.Dockerfile
    image: turing-agentmemory-llama-provider:local
    gpus: all
    command:
      - --hf-repo
      - Mungert/Qwen3-Reranker-0.6B-GGUF
      - --hf-file
      - Qwen3-Reranker-0.6B-q8_0.gguf
      - --rerank
      - --embedding
      - --pooling
      - rank
      - --device
      - CUDA0
      - --gpu-layers
      - all
      - --parallel
      - "1"
      - --no-cache-prompt
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    environment:
      - HOME=/models
      - LLAMA_CACHE=/models/llama.cpp
      - HF_HOME=/models/huggingface
      - XDG_CACHE_HOME=/models/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    expose:
      - "8080"
    volumes:
      - agentmemory-llama-cache:/models
    user: "10001:10001"
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "nvidia-smi >/dev/null && curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 80
      start_period: 60s
    shm_size: "1g"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8g
        reservations:
          cpus: "1.0"
          memory: 2g
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  agentmemory-lab:
    build:
      context: .
      args:
        PYPROJECT_EXTRAS: ${PYPROJECT_EXTRAS:-dev}
    image: turing-agentmemory-mcp:local
    depends_on:
      turing-agentmemory-mcp:
        condition: service_healthy
    command:
      - lab
      - --host
      - 0.0.0.0
      - --port
      - "8096"
      - --benchmark-dir
      - /work/.benchmarks
    environment:
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
    ports:
      - "127.0.0.1:8096:8096"
    volumes:
      - .:/work:ro
    user: "10001:10001"
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport socket\nsock = socket.create_connection(('127.0.0.1', 8096), timeout=2)\nsock.close()\nPY"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 96m

  e2e:
    build:
      context: .
      args:
        PYPROJECT_EXTRAS: ${PYPROJECT_EXTRAS:-dev}
    image: turing-agentmemory-mcp:local
    entrypoint: ["python", "scripts/e2e_score.py", "--out", "/tmp/e2e-results.json"]
    volumes:
      - .:/work
    environment:
      TURINGDB_E2E_HOME: /tmp/turing-agentmemory-e2e
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      PYTHONPYCACHEPREFIX: /tmp/pycache
      RUFF_CACHE_DIR: /tmp/ruff-cache

volumes:
  turing-data:
  agentmemory-llama-cache:
