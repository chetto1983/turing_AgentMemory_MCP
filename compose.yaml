name: turing-agentmemory-mcp

services:
  turingdb-volume-init:
    build:
      context: .
      dockerfile: docker/turingdb.Dockerfile
    image: turing-agentmemory-turingdb:local
    entrypoint: ["/bin/sh", "-c", "chown -R 10001:10001 /turing"]
    volumes:
      - turing-data:/turing
    user: "0:0"
    restart: "no"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

  turingdb:
    build:
      context: .
      dockerfile: docker/turingdb.Dockerfile
    image: turing-agentmemory-turingdb:local
    depends_on:
      turingdb-volume-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -eu
        rm -f /turing/turingdb.sock
        touch /tmp/.turing_history
        shutdown() {
          turingdb stop -turing-dir /turing || true
          exit 0
        }
        trap shutdown TERM INT
        turingdb start -turing-dir /turing -i 0.0.0.0 -p 6666 -demon
        while :; do
          python - <<'PY'
        from turingdb import TuringDB
        TuringDB(type='json', host='http://127.0.0.1:6666').try_reach(timeout=2)
        PY
          sleep 5
        done
    environment:
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
    ports:
      - "127.0.0.1:6666:6666"
    volumes:
      - turing-data:/turing
    user: "10001:10001"
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nfrom turingdb import TuringDB\nTuringDB(type='json', host='http://127.0.0.1:6666').try_reach(timeout=2)\nPY"]
      interval: 5s
      timeout: 3s
      retries: 80
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
        reservations:
          cpus: "0.25"
          memory: 256m

  agentmemory-gliner:
    build:
      context: .
      dockerfile: docker/gliner-provider.Dockerfile
    image: turing-agentmemory-gliner-provider:local
    environment:
      - HOME=/models
      - HF_HOME=/models/huggingface
      - XDG_CACHE_HOME=/models/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - GLINER_MODEL=lion-ai/gliner2-base-v1-onnx
      - GLINER_MODEL_REVISION=5551729ccc76b30395bc9600f2348ec52a87cead
      - GLINER_DEVICE=cpu
      - GLINER_BATCH_SIZE=1
      - GLINER_HOST=0.0.0.0
      - GLINER_PORT=8080
    expose:
      - "8080"
    volumes:
      - agentmemory-gliner-cache:/models
    user: "10001:10001"
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nfrom urllib.request import urlopen\nwith urlopen('http://127.0.0.1:8080/health', timeout=2) as response:\n    assert response.status == 200\nPY"]
      interval: 10s
      timeout: 3s
      retries: 80
      start_period: 300s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4g
        reservations:
          cpus: "1.0"
          memory: 1g

  turing-agentmemory-mcp:
    build:
      context: .
      args:
        PYPROJECT_EXTRAS: ${PYPROJECT_EXTRAS:-dev}
    image: turing-agentmemory-mcp:local
    depends_on:
      turingdb:
        condition: service_healthy
      agentmemory-embed:
        condition: service_healthy
      agentmemory-rerank:
        condition: service_healthy
      agentmemory-gliner:
        condition: service_healthy
    environment:
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - TURINGDB_URL=http://turingdb:6666
      - TURINGDB_HOME=/turing
      - TURINGDB_GRAPH=agent_memory
      - TURINGDB_MEMORY_INDEX=agent_memory_episode_vectors_768
      - TURINGDB_DOCUMENT_INDEX=agent_memory_document_vectors_768
      - TURINGDB_ENTITY_INDEX=agent_memory_entity_vectors_768
      - TURINGDB_FACT_INDEX=agent_memory_fact_vectors_768
      - TURINGDB_COMMUNITY_INDEX=agent_memory_community_vectors_768
      - EMBED_BASE_URL=http://agentmemory-embed:8080
      - EMBED_DIMENSIONS=768
      - EMBED_MODEL=mykor/granite-embedding-311m-multilingual-r2-GGUF:Q4_K_M
      - EMBED_API_KEY
      - EMBED_API_KEY_HEADER
      - EMBED_API_KEY_SCHEME
      - RERANK_BASE_URL=http://agentmemory-rerank:8080
      - RERANK_MODEL=Qwen3-Reranker-0.6B-q8_0.gguf
      - RERANK_PROVIDER_MIN_SCORE=${RERANK_PROVIDER_MIN_SCORE:-0}
      - RERANK_CANDIDATE_LIMIT=${RERANK_CANDIDATE_LIMIT:-50}
      - RERANK_DIMENSIONS
      - RERANK_TIMEOUT_SECONDS
      - RERANK_THRESHOLD
      - RERANK_BLEND
      - RERANK_PRESERVE_SEED_MARGIN
      - RERANK_API_KEY
      - RERANK_API_KEY_HEADER
      - RERANK_API_KEY_SCHEME
      - PROVIDER_API_KEY
      - PROVIDER_API_KEY_HEADER
      - PROVIDER_API_KEY_SCHEME
      - GLINER_ENABLED=1
      - GLINER_BACKEND=gliner2_http
      - GLINER_MODEL=lion-ai/gliner2-base-v1-onnx
      - GLINER_BASE_URL=http://agentmemory-gliner:8080
      - GLINER_TIMEOUT_SECONDS=900
      - GLINER_LABELS
      - GLINER_THRESHOLD
      - GLINER_REDACT
      - GLINER_PRECISION
      - GLINER_PROVIDERS
      - GLINER_MEMORY_SCHEMA=memory-v1
      - AGENTMEMORY_FUSION_ENABLED=1
      - AGENTMEMORY_SPARSE_PATH=/turing/data/agent-memory-fts.sqlite3
      - AGENTMEMORY_COMMUNITY_REBUILD_ON_BATCH=1
      - AGENTMEMORY_LEIDEN_SEED=42
      - AGENTMEMORY_LEIDEN_RESOLUTION=1.0
      - AGENTMEMORY_LEIDEN_RANDOMNESS=0.001
      - AGENTMEMORY_LEIDEN_ITERATIONS=2
      - AGENTMEMORY_LEIDEN_MAX_CLUSTER_SIZE=100
      - AGENTMEMORY_FUSION_WEIGHTS
      - AGENTMEMORY_REDACTION_ENABLED
      - AGENTMEMORY_AUDIT_JSONL
      - AGENTMEMORY_OBSERVABILITY_JSONL
      - AGENTMEMORY_OBSERVABILITY_STDERR
      - AGENTMEMORY_AUTH_TOKEN
      - AGENTMEMORY_AUTH_TOKENS
      - AGENTMEMORY_AUTH_CLIENT_ID
      - AGENTMEMORY_AUTH_SCOPES
      - AGENTMEMORY_AUTH_REQUIRED_SCOPES
      - AGENTMEMORY_UTCP_SERVER_NAME
      - AGENTMEMORY_UTCP_MCP_COMMAND
      - AGENTMEMORY_UTCP_AUTH_ENV
    ports:
      - "127.0.0.1:8095:8080"
    volumes:
      - turing-data:/turing
    user: "10001:10001"
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport json\nfrom urllib.request import urlopen\nwith urlopen('http://127.0.0.1:8080/health', timeout=2) as response:\n    payload = json.load(response)\nassert payload['status'] == 'ok'\nassert payload['runtime']['stages']['graph']['ready'] is True\nPY"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m

  agentmemory-model-init:
    build:
      context: .
      dockerfile: docker/llama-provider.Dockerfile
    image: turing-agentmemory-llama-provider:local
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mkdir -p /models/pinned
        provision() {
          url=$$1
          sha256=$$2
          final=$$3
          partial="$$final.partial"
          if [ -f "$$final" ] && printf '%s  %s\n' "$$sha256" "$$final" | sha256sum -c -; then
            return 0
          fi
          curl -fL --retry 5 --retry-delay 2 --retry-all-errors \
            --connect-timeout 30 --speed-limit 1024 --speed-time 120 \
            --output "$$partial" "$$url"
          printf '%s  %s\n' "$$sha256" "$$partial" | sha256sum -c -
          mv "$$partial" "$$final"
        }
        provision \
          'https://huggingface.co/mykor/granite-embedding-311m-multilingual-r2-GGUF/resolve/4413a1d4c63ed0aeda030202ad982a613a91f9ea/granite-embedding-311M-multilingual-r2-Q4_K_M.gguf?download=true' \
          '58d27f63e69ccf7abce27bf6b35bb0edebc3a1c05ad4a3165acaba1cdca107c0' \
          '/models/pinned/granite-embedding-311M-multilingual-r2-Q4_K_M.gguf'
        provision \
          'https://huggingface.co/Mungert/Qwen3-Reranker-0.6B-GGUF/resolve/041387f8ed7ead711b9496b153b682c5b2f5d158/Qwen3-Reranker-0.6B-q8_0.gguf?download=true' \
          '8b5337e5baadf83fdd6f7a865dde4b3627fc53a1c8e56cc2f83260dfdd089c49' \
          '/models/pinned/Qwen3-Reranker-0.6B-q8_0.gguf'
    volumes:
      - agentmemory-llama-cache:/models
    user: "10001:10001"
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run

  agentmemory-gemma-model-init:
    profiles: ["embeddinggemma-eval"]
    build:
      context: .
      dockerfile: docker/llama-provider.Dockerfile
    image: turing-agentmemory-llama-provider:local
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mkdir -p /models/pinned
        final=/models/pinned/embeddinggemma-300M-Q8_0.gguf
        partial="$$final.partial"
        sha256=a0f7b4e13c397a6e1b32c2de75b1f65a14c92ec524d5f674d94a4290a1c4969b
        if [ -f "$$final" ] && printf '%s  %s\n' "$$sha256" "$$final" | sha256sum -c -; then
          exit 0
        fi
        curl -fL --retry 5 --retry-delay 2 --retry-all-errors \
          --connect-timeout 30 --speed-limit 1024 --speed-time 120 \
          --output "$$partial" \
          'https://huggingface.co/unsloth/embeddinggemma-300m-GGUF/resolve/6661a6504c30d8304af13455cb4a5d4f5bc6011f/embeddinggemma-300M-Q8_0.gguf?download=true'
        printf '%s  %s\n' "$$sha256" "$$partial" | sha256sum -c -
        mv "$$partial" "$$final"
    volumes:
      - agentmemory-llama-cache:/models
    user: "10001:10001"
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run

  agentmemory-embed:
    build:
      context: .
      dockerfile: docker/llama-provider.Dockerfile
    image: turing-agentmemory-llama-provider:local
    depends_on:
      agentmemory-model-init:
        condition: service_completed_successfully
    gpus: all
    command:
      - --model
      - /models/pinned/granite-embedding-311M-multilingual-r2-Q4_K_M.gguf
      - --embedding
      - --pooling
      - mean
      - --embd-normalize
      - "2"
      - --batch-size
      - "4096"
      - --ubatch-size
      - "4096"
      - --device
      - CUDA0
      - --gpu-layers
      - all
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    environment:
      - HOME=/models
      - LLAMA_CACHE=/models/llama.cpp
      - HF_HOME=/models/huggingface
      - XDG_CACHE_HOME=/models/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    expose:
      - "8080"
    volumes:
      - agentmemory-llama-cache:/models
    user: "10001:10001"
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "nvidia-smi >/dev/null && curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 80
      start_period: 60s
    shm_size: "1g"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8g
        reservations:
          cpus: "1.0"
          memory: 2g
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  agentmemory-embed-gemma:
    profiles: ["embeddinggemma-eval"]
    build:
      context: .
      dockerfile: docker/llama-provider.Dockerfile
    image: turing-agentmemory-llama-provider:local
    depends_on:
      agentmemory-gemma-model-init:
        condition: service_completed_successfully
    gpus: all
    command:
      - --model
      - /models/pinned/embeddinggemma-300M-Q8_0.gguf
      - --embedding
      - --pooling
      - mean
      - --embd-normalize
      - "2"
      - --batch-size
      - "4096"
      - --ubatch-size
      - "4096"
      - --device
      - CUDA0
      - --gpu-layers
      - all
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    environment:
      - HOME=/models
      - LLAMA_CACHE=/models/llama.cpp
      - HF_HOME=/models/huggingface
      - XDG_CACHE_HOME=/models/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    expose:
      - "8080"
    volumes:
      - agentmemory-llama-cache:/models
    user: "10001:10001"
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "nvidia-smi >/dev/null && curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 80
      start_period: 60s
    shm_size: "1g"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8g
        reservations:
          cpus: "1.0"
          memory: 2g
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  agentmemory-rerank:
    build:
      context: .
      dockerfile: docker/llama-provider.Dockerfile
    image: turing-agentmemory-llama-provider:local
    depends_on:
      agentmemory-model-init:
        condition: service_completed_successfully
    gpus: all
    command:
      - --model
      - /models/pinned/Qwen3-Reranker-0.6B-q8_0.gguf
      - --rerank
      - --embedding
      - --pooling
      - rank
      - --device
      - CUDA0
      - --gpu-layers
      - all
      - --parallel
      - "1"
      - --no-cache-prompt
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    environment:
      - HOME=/models
      - LLAMA_CACHE=/models/llama.cpp
      - HF_HOME=/models/huggingface
      - XDG_CACHE_HOME=/models/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    expose:
      - "8080"
    volumes:
      - agentmemory-llama-cache:/models
    user: "10001:10001"
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "nvidia-smi >/dev/null && curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 80
      start_period: 60s
    shm_size: "1g"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8g
        reservations:
          cpus: "1.0"
          memory: 2g
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  agentmemory-lab:
    build:
      context: .
      args:
        PYPROJECT_EXTRAS: ${PYPROJECT_EXTRAS:-dev}
    image: turing-agentmemory-mcp:local
    depends_on:
      turing-agentmemory-mcp:
        condition: service_healthy
    command:
      - lab
      - --host
      - 0.0.0.0
      - --port
      - "8096"
      - --benchmark-dir
      - /work/.benchmarks
    environment:
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - PYTHONPYCACHEPREFIX=/tmp/pycache
    ports:
      - "127.0.0.1:8096:8096"
    volumes:
      - .:/work:ro
    user: "10001:10001"
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport socket\nsock = socket.create_connection(('127.0.0.1', 8096), timeout=2)\nsock.close()\nPY"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 96m

  e2e:
    profiles: ["e2e"]
    build:
      context: .
      args:
        PYPROJECT_EXTRAS: ${PYPROJECT_EXTRAS:-dev}
    image: turing-agentmemory-mcp:local
    entrypoint: ["python", "scripts/e2e_score.py", "--out", "/tmp/e2e-results.json"]
    volumes:
      - .:/work
    environment:
      TURINGDB_E2E_HOME: /tmp/turing-agentmemory-e2e
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      PYTHONPYCACHEPREFIX: /tmp/pycache
      RUFF_CACHE_DIR: /tmp/ruff-cache

volumes:
  turing-data:
  agentmemory-llama-cache:
  agentmemory-gliner-cache:
