name: turing-agentmemory-mcp

services:
  turingdb:
    build:
      context: .
      dockerfile: docker/turingdb.Dockerfile
    image: turing-agentmemory-turingdb:local
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -e
        turingdb start -turing-dir /turing -i 0.0.0.0 -p 6666 -demon -start-timeout 5000
        trap 'turingdb stop -turing-dir /turing -timeout 5000' TERM INT EXIT
        tail -f /dev/null
    ports:
      - "127.0.0.1:6666:6666"
    volumes:
      - turing-data:/turing
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nfrom turingdb import TuringDB\nTuringDB(type='json', host='http://127.0.0.1:6666').try_reach(timeout=2)\nPY"]
      interval: 5s
      timeout: 3s
      retries: 20

  turing-agentmemory-mcp:
    build: .
    image: turing-agentmemory-mcp:local
    depends_on:
      turingdb:
        condition: service_healthy
    environment:
      TURINGDB_URL: http://turingdb:6666
      TURINGDB_HOME: /turing
      TURINGDB_GRAPH: agent_memory
      AURA_EMBED_BASE_URL: http://host.docker.internal:8081
      AURA_EMBED_DIMENSIONS: "768"
      AURA_EMBED_MODEL: aura-local-embedding
      AURA_RERANK_BASE_URL: http://host.docker.internal:8085
      AURA_RERANK_MODEL: aura-rerank
    ports:
      - "127.0.0.1:8095:8080"
    volumes:
      - turing-data:/turing

  e2e:
    build: .
    image: turing-agentmemory-mcp:local
    entrypoint: ["python", "scripts/e2e_score.py", "--out", "/work/e2e-results.json"]
    volumes:
      - .:/work
    environment:
      TURINGDB_E2E_HOME: /tmp/turing-agentmemory-e2e

volumes:
  turing-data:
