# Dependabot dependency + supply-chain update automation.
# Complements the CI supply-chain job (pip-audit) by proposing version bumps as PRs.
version: 2
updates:
  # Python runtime + dev dependencies declared in pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns: ["*"]

  # GitHub Actions used by the CI + CodeQL workflows (keeps action pins current).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]

  # Base images in the root Dockerfile and the docker/ sidecar Dockerfiles.
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
