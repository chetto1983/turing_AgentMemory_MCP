# CodeQL static security analysis (code scanning) for the Python source.
# Complements ci.yml's supply-chain (pip-audit) job: pip-audit finds vulnerable
# dependencies; CodeQL finds vulnerabilities in this repo's own code.
name: CodeQL

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "27 6 * * 1" # weekly, Monday 06:27 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload results to the code-scanning dashboard
      actions: read
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
