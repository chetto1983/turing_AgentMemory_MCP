name: CI

# L-04 gate: lint + unit-tests(+coverage floor) + compose-validation + supply-chain
# + dockerized-integration on every push/PR to master. Heavy gates (full E2E, coverage,
# supply-chain) intentionally live here, not in the fast local lefthook hooks (L-05).
#
# no-skip-as-green (D-03/D-04/CI-07): any job that can exercise a skippable
# integration/gpu-marked tier sets `env: { CI: "true" }` to arm the tests/conftest.py
# hookwrapper guard, converting a marked skip into a hard failure.
#
# E2E score gate (D-05/D-06/CI-08): this repo has no GPU runner. The
# dockerized-integration job runs the deterministic E2E score gate against the
# in-process stub embed/rerank endpoints scripts/e2e_score.py already spins up. Every
# scenario check is decided by exact-token/lexical matching over deterministic test
# fixtures, so the HashingEmbedder stub reaches the script's own VALIDATED_10_10 bar
# (19/19 checks, score 10.0). The CI job below asserts that verdict directly: all 19
# checks executed (never a silent skip), valid JSON, and VALIDATED_10_10
# (check_count == 19 AND score >= 9.8). Real embed/rerank providers
# (E2E_USE_EXTERNAL_EMBED=1/E2E_USE_EXTERNAL_RERANK=1 + GPU sidecars) exercise the
# same checks with semantic ranking and belong to a future GPU/real-embed CI tier.
#
# CI-05 (real-document E2E): satisfied by the deterministic in-process real-file path
# (D-10) — scripts/e2e_score.py's document flow plus the existing deterministic
# document tests in the unit-tests job. The other, operator-run benchmark script that
# needs a live paid LLM key and a pre-running MCP server stays outside CI entirely and
# is intentionally NOT wired here.

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install "ruff==0.15.21"
      - run: ruff format --check src tests scripts
      - run: ruff check src tests scripts
      - run: bash scripts/check-file-size.sh

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # Coverage floor measured against the post-decomposition suite (D-07/CI-09):
      # 364 tests, 78.12% covered (e2e_score.py omitted per [tool.coverage.run]).
      # Never guessed; ratchets up only, never silently lowered.
      #
      # `integration`/`gpu`-marked tests need a live external service / GPU that this
      # runner does not have. Deselect them here (same tier as the local fast-tests
      # hook) so they are NOT collected -- a deselect is not a skip, so GitHub's
      # default CI=true does not trip the tests/conftest.py no-skip-as-green guard.
      # `slow` still runs. The real ArcadeDB path is exercised in CI by the
      # dockerized-integration E2E job below (which restarts a live arcadedb).
      - run: python -m pytest -m "not integration and not gpu" --cov=src/turing_agentmemory_mcp --cov-fail-under=78 -q
      - name: no-skip-as-green guard self-test
        env:
          CI: "true" # arms the tests/conftest.py no-skip-as-green hookwrapper guard
        run: python -m pytest tests/test_no_skip_as_green_guard.py -q

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose config --quiet

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" "pip-audit==2.10.1"
      - run: pip-audit # audits the active virtualenv's resolved distributions

  dockerized-integration:
    runs-on: ubuntu-latest
    env:
      CI: "true" # arms the no-skip-as-green guard for this job too
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Start the ArcadeDB service (published on 127.0.0.1:2480, health-gated)
        # 04-09 rewired the E2E off the retired in-process turingdb daemon onto a real
        # arcadedb container. `--wait` blocks on the service healthcheck
        # (GET /api/v1/ready) so the score run never races container startup. Only the
        # `arcadedb` service starts here; the `e2e` compose service (build image) is
        # intentionally NOT used -- see the run step for why the E2E runs on the host.
        run: docker compose up -d --wait arcadedb
      - name: "E2E score gate — VALIDATED_10_10 (D-05/D-06): 19/19 checks executed, score >= 9.8, never a silent skip"
        env:
          # Run scripts/e2e_score.py ON THE HOST, not via `docker compose run e2e`:
          # the D-10 restart leg (restart_backend_and_wait_ready) shells out to
          # `docker compose stop/start arcadedb`, which needs docker on PATH and
          # host-level control of the sibling service -- impossible from inside the
          # e2e container (no docker socket), which is why the in-container run can
          # only reach 18/19. On the host the restart is real, so the run reaches the
          # full 19/19. In-process stub embed/rerank (HashingEmbedder) keep it
          # GPU-free and deterministic. ARCADEDB_URL uses the published host port.
          ARCADEDB_URL: http://127.0.0.1:2480
          ARCADEDB_USER: root
          ARCADEDB_PASSWORD: agentmemory-arcadedb-dev
          ARCADEDB_E2E_HOME: /tmp/arcadedb-e2e
        run: |
          # The script's own exit code already asserts VALIDATED_10_10 (score>=9.8,
          # 19/19 checks). `|| true` keeps this step alive so the explicit assertions
          # below can report a precise diagnostic (which guard failed) instead of a
          # bare non-zero exit.
          python scripts/e2e_score.py --out e2e-result.json || true
          if ! jq -e . e2e-result.json >/dev/null 2>&1; then
            echo "FAIL: E2E produced no valid JSON result (script crashed)."
            echo "--- captured file ---"; cat e2e-result.json || true
            exit 1
          fi
          score=$(jq '.score' e2e-result.json)
          check_count=$(jq '.check_count' e2e-result.json)
          verdict=$(jq -r '.verdict' e2e-result.json)
          echo "E2E: score=$score check_count=$check_count verdict=$verdict"
          if [ "$check_count" != "19" ]; then
            echo "FAIL: expected 19 executed checks, got $check_count (a check may have been skipped — never a silent skip)"
            jq '.checks[] | {name, ok}' e2e-result.json
            exit 1
          fi
          if ! awk -v s="$score" 'BEGIN { exit !(s >= 9.8) }'; then
            echo "FAIL: score $score is below the VALIDATED_10_10 bar of 9.8"
            jq '.checks[] | select(.ok == false)' e2e-result.json
            exit 1
          fi
          if [ "$verdict" != "VALIDATED_10_10" ]; then
            echo "FAIL: verdict is $verdict, expected VALIDATED_10_10"
            exit 1
          fi
          echo "PASS: VALIDATED_10_10 (19/19 checks, score $score)"
      - name: ArcadeDB logs (on failure)
        if: failure()
        run: docker compose logs arcadedb | tail -120
      - name: Teardown
        if: always()
        run: docker compose down -v
