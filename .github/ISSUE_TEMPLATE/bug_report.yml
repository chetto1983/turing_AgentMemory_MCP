name: Bug report
description: Report a reproducible defect using synthetic data
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, customer data, private documents, or security exploit details.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python or image version, provider identities, vector dimensions, and deployment mode.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands and synthetic inputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: health
    attributes:
      label: Content-free health and logs
      description: Remove tokens, text, paths, and user identifiers.
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I used synthetic data and removed secrets and personal information.
          required: true
        - label: This is not a vulnerability report; security issues use SECURITY.md.
          required: true
