name: Feature request
description: Propose a scoped product or engineering improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the operator or integrator problem, not only a proposed implementation.
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Expected contract
      description: Include tenant, durability, failure, and compatibility requirements.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Explain how users and maintainers can prove the change works.
    validations:
      required: true
